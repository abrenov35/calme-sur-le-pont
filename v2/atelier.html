<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Atelier V2 — Le Calme sur le Pont</title>
  <style>
    :root {
      --navy: #162D49;
      --navy2: #1e3d61;
      --gold: #C8A464;
      --beige: #0e1e2e;
      --dark: #e8e8e8;
      --mid: #8a9db0;
      --light: rgba(255,255,255,0.04);
      --border: #2a4060;
      --v1bg: rgba(255,255,255,0.03);
      --v2bg: rgba(200,164,100,0.04);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--beige); color: var(--dark); min-height: 100vh; }

    /* TOP NAV */
    .topnav {
      background: var(--navy);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 200;
      border-bottom: 2px solid var(--gold);
    }
    .topnav a { color: #8a9db0; text-decoration: none; font-size: 11px; letter-spacing: 1px; }
    .topnav a:hover { color: var(--gold); }
    .topnav .sep { color: #2a4060; }
    .topnav .current { color: var(--gold); font-size: 11px; }
    .topnav .badge { background: rgba(255,160,0,0.15); color: #c07000; font-size: 10px; letter-spacing: 2px; padding: 2px 8px; border-radius: 20px; border: 1px solid rgba(200,130,0,0.3); margin-left: auto; }

    /* LAYOUT */
    .workspace {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 0;
      height: calc(100vh - 44px);
    }

    /* LEFT PANEL */
    .panel-left {
      background: rgba(255,255,255,0.02);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-header {
      background: var(--navy);
      color: var(--gold);
      padding: 14px 18px;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    label {
      display: block;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
    }
    select, textarea, input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 10px 12px;
      font-family: Georgia, serif;
      font-size: 13px;
      color: var(--dark);
      background: var(--light);
      resize: vertical;
      transition: border-color 0.2s;
    }
    select:focus, textarea:focus { outline: none; border-color: var(--gold); }
    select { resize: none; cursor: pointer; }

    .btn {
      display: block;
      width: 100%;
      padding: 11px 16px;
      border: none;
      border-radius: 3px;
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 12px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .btn-primary { background: var(--navy); color: white; }
    .btn-primary:hover { background: var(--navy2); }
    .btn-gold { background: var(--gold); color: white; }
    .btn-gold:hover { background: #b8944a; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--mid); }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
    .btn-small { display: inline-block; width: auto; padding: 6px 12px; font-size: 11px; }
    .btn-danger { background: #c0392b; color: white; }

    .form-section {
      background: var(--light);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 14px;
    }
    .form-section.highlight { border-color: var(--gold); background: rgba(200,164,100,0.05); }

    .prompt-area { position: relative; }
    .prompt-area textarea { font-family: 'Helvetica Neue', monospace; font-size: 12px; min-height: 54px; height: 54px; background: #f8f4f0; }
    .copy-small {
      position: absolute; top: 6px; right: 6px;
      padding: 4px 10px; background: var(--navy); color: white;
      border: none; border-radius: 2px; font-size: 10px; cursor: pointer; letter-spacing: 1px;
    }

    /* HISTORIQUE */
    .history-block { border-top: 1px solid var(--border); padding-top: 12px; }
    .history-item {
      background: rgba(255,255,255,0.02); border: 1px solid var(--border);
      border-radius: 3px; padding: 10px 12px; margin-bottom: 8px; font-size: 12px;
    }
    .history-item .h-date { font-size: 10px; color: var(--mid); margin-bottom: 4px; display:flex; justify-content:space-between; align-items:center; }
    .history-item .h-chapter { color: var(--gold); font-size: 10px; letter-spacing: 1px; margin-bottom: 4px; }
    .history-item .h-summary { color: var(--dark); line-height: 1.5; }
    .history-item .h-actions { margin-top: 8px; display: flex; gap: 6px; }

    /* RIGHT PANEL */
    .panel-right { display: flex; flex-direction: column; overflow: hidden; }
    .preview-header {
      background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border);
      padding: 12px 24px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .preview-header .preview-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); }
    .preview-header .preview-chapter { font-family: Georgia, serif; font-size: 14px; color: var(--dark); }
    .preview-header .status { margin-left: auto; font-size: 10px; color: var(--mid); font-style: italic; }

    .preview-body { flex: 1; overflow-y: auto; background: var(--beige); padding: 40px; }

    /* BOOK STYLES */
    .book-preview { max-width: 600px; margin: 0 auto; font-family: 'Georgia', 'Times New Roman', serif; }
    .book-preview .ch-label { font-family: 'Helvetica Neue', sans-serif; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; font-weight: 600; }
    .book-preview .ch-title { font-size: 30px; font-weight: normal; letter-spacing: 1.5px; margin-bottom: 24px; color: #ffffff; line-height: 1.3; }
    .book-preview .ch-divider { width: 48px; height: 2px; background: var(--gold); margin-bottom: 32px; border-radius: 1px; }
    .book-preview p { font-size: 16px; line-height: 1.95; color: #d8dde3; margin-bottom: 16px; text-align: justify; hyphens: auto; }

    /* V1 ZONE — texte original, présenté comme citation littéraire */
    .v1-zone {
      background: rgba(255,255,255,0.025);
      border-radius: 4px;
      padding: 28px 30px;
      margin-bottom: 36px;
      border-left: 3px solid var(--border);
      border-top: 1px solid var(--border);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .v1-zone .v1-badge {
      display: inline-block;
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--mid); background: rgba(255,255,255,0.06);
      padding: 4px 12px; border-radius: 3px;
      margin-bottom: 18px; font-weight: 600;
    }
    .v1-zone p { color: #c5cbd3; font-style: italic; }
    .v1-zone p:last-child { margin-bottom: 0; }
    .v1-lock {
      position: absolute; top: 16px; right: 18px;
      font-size: 14px; color: var(--mid); user-select: none; opacity: 0.6;
    }

    /* V2 ZONE */
    .v2-zone { margin-top: 8px; }
    .v2-separator {
      display: flex; align-items: center; gap: 14px;
      margin: 40px 0 32px;
    }
    .v2-separator .v2-label {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
      color: var(--gold); white-space: nowrap; font-weight: 600;
    }
    .v2-separator .v2-line { flex: 1; height: 1px; background: var(--gold); opacity: 0.35; }

    /* Sous-titres de section (anciennement faibles) */
    .book-preview .part-tag {
      font-family: 'Georgia', serif;
      font-size: 20px; font-weight: normal; letter-spacing: 0.5px; text-transform: none;
      color: #ffffff; margin: 36px 0 16px; padding: 0 0 10px 0;
      background: none; border-left: none; border-bottom: 1px solid rgba(200,164,100,0.3);
    }
    .book-preview .note-de-bord {
      background: var(--navy); color: white;
      padding: 22px 26px; margin: 32px 0; border-radius: 4px;
      border: 1px solid rgba(200,164,100,0.2);
    }
    .book-preview .note-de-bord .ndb-label {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--gold); margin-bottom: 12px; font-weight: 600;
    }
    .book-preview .note-de-bord p { color: #cfe0ee; font-size: 15px; margin-bottom: 0; font-style: italic; }

    /* Blocs V2 — sans fond, titres en série littéraire */
    .book-preview .encadre {
      background: transparent;
      border: none;
      padding: 0 0 4px;
      margin: 32px 0 8px;
    }
    .book-preview .encadre .enc-label {
      font-family: 'Georgia', serif;
      font-size: 20px; font-weight: normal;
      color: #ffffff;
      margin-bottom: 16px;
      letter-spacing: 0.5px;
      text-transform: none;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(200,164,100,0.3);
    }
    .book-preview .encadre p { font-size: 16px; color: #d8dde3; line-height: 1.95; }
    .book-preview .illus { margin: 36px 0; text-align: center; }
    .book-preview .illus img { width: 100%; max-width: 520px; border: 1px solid var(--border); border-radius: 3px; }
    .book-preview .empty-state { text-align: center; padding: 60px 20px; color: var(--mid); }
    .book-preview .empty-state .es-icon { font-size: 40px; margin-bottom: 16px; }
    .book-preview .empty-state p { font-size: 13px; font-style: italic; }

    .v2-empty {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 12px; color: var(--mid); font-style: italic;
      text-align: center; padding: 20px;
      border: 1px dashed var(--border); border-radius: 4px;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .workspace { grid-template-columns: 1fr; height: auto; }
      .panel-right { min-height: 60vh; }
    }
  </style>
</head>
<body>

<div class="workspace">

  <!-- ═══ COLONNE GAUCHE ═══ -->
  <div class="panel-left">
    <div class="panel-header">Atelier d'édition V2</div>
    <div class="panel-body">

      <!-- 1. SÉLECTION CHAPITRE -->
      <div class="form-section">
        <label>1 — Chapitre à travailler</label>
        <select id="chapterSelect" onchange="onChapterChange()">
          <option value="">— Choisir un chapitre —</option>
          <option value="intro">Introduction — L'Art de tenir la barre</option>
          <option value="preambule">Préambule — L'Héritage du Large</option>
          <option value="ch1">Chapitre 1 — Le Don du Capitaine</option>
          <option value="ch2">Chapitre 2 — Le Calme sur le Pont</option>
          <option value="ch3">Chapitre 3 — Le Bruit de Fond</option>
          <option value="ch4">Chapitre 4 — La Cabine</option>
          <option value="ch5">Chapitre 5 — Les Instruments de Bord</option>
          <option value="ch6">Chapitre 6 — Le Vent Contraire</option>
          <option value="ch7">Chapitre 7 — Le Long Cours</option>
          <option value="epilogue">Épilogue — Le Port</option>
        </select>
      </div>

      <!-- 2. IDÉE OPTIONNELLE -->
      <div class="form-section" id="ideaSection" style="display:none">
        <label>2 — Précision / demande <span style="color:var(--mid);font-size:9px;letter-spacing:0">(optionnel)</span></label>
        <textarea id="ideaInput" rows="3" placeholder="Ex: Insister sur la transmission, ajouter une anecdote concrète…"></textarea>
        <button class="btn btn-primary" style="margin-top:10px" onclick="generatePrompt()">⚡ Générer le prompt enrichi</button>
      </div>

      <!-- 3. PROMPT GÉNÉRÉ -->
      <div class="form-section highlight" id="promptSection" style="display:none">
        <label>3 — Prompt <span style="color:var(--mid);font-size:9px;letter-spacing:0">(modifiable)</span></label>
        <div class="prompt-area">
          <textarea id="promptOutput" rows="3"></textarea>
          <button class="copy-small" onclick="copyPrompt()">Copier</button>
        </div>
      </div>

      <!-- 4. RÉSULTAT IA -->
      <div class="form-section" id="resultSection" style="display:none">
        <label>4 — Résultat IA</label>
        <textarea id="resultInput" rows="3" placeholder="Colle ici le résultat obtenu depuis Claude, ChatGPT, Gemini…"></textarea>
        <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
          <button class="btn btn-gold" onclick="syncResult()" title="Remplace la V2 de ce chapitre">↺ Remplacer V2</button>
          <button class="btn" style="background:#1e3d61;color:#fff;border:none" onclick="integrateResult()" title="Ajoute à la suite de la V2">+ Ajouter à V2</button>
          <button class="btn btn-outline btn-small" onclick="clearResult()">Effacer</button>
        </div>
      </div>

      <!-- REMPLACEMENT DE TEXTE -->
      <div class="form-section" id="replaceSection" style="display:none">
        <label>5 — Rechercher / Remplacer dans V2</label>
        <textarea id="searchInput" rows="2" placeholder="Colle ici le texte à remplacer…" style="margin-bottom:8px"></textarea>
        <textarea id="replaceInput" rows="2" placeholder="Texte de remplacement…" style="margin-bottom:10px"></textarea>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary" onclick="applyReplace()">✓ Remplacer</button>
          <button class="btn btn-outline btn-small" onclick="clearReplace()">Effacer</button>
        </div>
        <div id="replaceStatus" style="font-size:11px;margin-top:8px;color:var(--mid);min-height:16px"></div>
      </div>

      <!-- HISTORIQUE par chapitre -->
      <div class="history-block" id="historyBlock" style="display:none">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <span style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold)">Historique V2 <span id="save-dot" style="display:none;color:#e67e22" title="Modifications non exportées">●</span></span>
          <div style="display:flex;gap:6px;align-items:center">
            <span id="autosave-status" style="font-size:10px;color:var(--gold);opacity:.7"></span>
            <button class="btn btn-small" style="background:#162D49;color:#C8A464;border:1px solid #C8A464;font-size:10px" onclick="exportSave()">💾 Exporter</button>
            <button class="btn btn-small" style="background:transparent;border:1px solid var(--border);color:var(--mid);font-size:10px" onclick="resetChapterV2()" title="Effacer tous les enrichissements V2 de ce chapitre">🗑 Réinit.</button>
          </div>
        </div>
        <div id="historyList"></div>
      </div>

    </div>
  </div>

  <!-- ═══ COLONNE DROITE — APERÇU ═══ -->
  <div class="panel-right">
    <div class="preview-header">
      <span class="preview-label">Aperçu</span>
      <span class="preview-chapter" id="previewChapterName">— Sélectionner un chapitre —</span>
      <span class="status" id="previewStatus"></span>
      <div id="validateBtns" style="display:none;gap:6px;margin-left:8px">
        <button class="btn btn-small" style="background:#2a6e3a;color:#fff;border:none;font-size:10px" onclick="validateVersion()">✓ Valider</button>
        <button class="btn btn-small btn-outline" style="font-size:10px" onclick="revertLast()">↩ Annuler</button>
      </div>
    </div>
    <div class="preview-body">
      <div class="book-preview" id="bookPreview">
        <div class="empty-state">
          <div class="es-icon">⚓</div>
          <p>Sélectionnez un chapitre dans l'atelier<br/>pour voir son contenu apparaître ici.</p>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════════════
// DONNÉES STATIQUES
// ══════════════════════════════════════════════
const CHAPTER_NAMES = {
  intro: "Introduction — L'Art de tenir la barre",
  preambule: "Préambule — L'Héritage du Large",
  ch1: "Chapitre 1 — Le Don du Capitaine",
  ch2: "Chapitre 2 — Le Calme sur le Pont",
  ch3: "Chapitre 3 — Le Bruit de Fond",
  ch4: "Chapitre 4 — La Cabine",
  ch5: "Chapitre 5 — Les Instruments de Bord",
  ch6: "Chapitre 6 — Le Vent Contraire",
  ch7: "Chapitre 7 — Le Long Cours",
  epilogue: "Épilogue — Le Port"
};
const CHAPTER_LABELS = {
  intro:"Introduction", preambule:"Préambule",
  ch1:"Chapitre 1", ch2:"Chapitre 2", ch3:"Chapitre 3", ch4:"Chapitre 4",
  ch5:"Chapitre 5", ch6:"Chapitre 6", ch7:"Chapitre 7", epilogue:"Épilogue"
};
const CHAPTER_TITLES = {
  intro:"L'ART DE TENIR LA BARRE", preambule:"L'HÉRITAGE DU LARGE",
  ch1:"LE DON DU CAPITAINE", ch2:"LE CALME SUR LE PONT",
  ch3:"LE BRUIT DE FOND", ch4:"LA CABINE", ch5:"LES INSTRUMENTS DE BORD",
  ch6:"LE VENT CONTRAIRE", ch7:"LE LONG COURS", epilogue:"LE PORT"
};
const CHAPTER_IMAGES = {
  intro:"../assets/images/art_barre.jpeg", preambule:"../assets/images/preambule.jpeg",
  ch1:"../assets/images/ch1.jpeg", ch2:"../assets/images/ch2.jpeg",
  ch3:"../assets/images/ch3.jpeg", ch4:"../assets/images/ch4.jpeg", ch5:"../assets/images/ch5.jpeg",
  ch6:"../assets/images/ch5_vent_contraire.jpeg", ch7:"../assets/images/ch6_long_cours.jpeg",
  epilogue:"../assets/images/epilogue.jpeg"
};

// Thèmes de chaque chapitre pour le prompt auto
const CHAPTER_THEMES = {
  intro: "Le Capitaine comme fonction intérieure. La cabine comme espace de clarté. Le voyage d'une conscience.",
  preambule: "L'héritage transmis entre capitaines. L'apprentissage par l'observation. La transmission silencieuse.",
  ch1: "La préparation avant le départ. Anticiper les problèmes avant qu'ils n'apparaissent. L'attention aux détails.",
  ch2: "Le calme comme force. Tenir la barre sans agitation. La confiance dans le navire et l'équipage.",
  ch3: "Le bruit de fond qui parasite le jugement. La différence entre le problème et le bruit autour du problème.",
  ch4: "La cabine comme refuge intérieur. Entretenir sa propre clarté plutôt que de combattre la tempête. La sérénité comme exemple silencieux transmis aux autres.",
  ch5: "Les instruments de navigation comme guides. Faire confiance aux outils et à l'équipage. Ne pas tout contrôler seul.",
  ch6: "Le vent contraire comme réalité du voyage. S'adapter sans résister. Continuer malgré les obstacles.",
  ch7: "Le long cours : tenir dans la durée. La patience comme compétence. Lâcher prise sur la surveillance constante.",
  epilogue: "Le port comme destination et comme repos. Le bilan du voyage. La transmission à la prochaine génération."
};

// ══════════════════════════════════════════════
// V1 — TEXTES ORIGINAUX (LECTURE SEULE, IMMUABLES)
// ══════════════════════════════════════════════
const V1_TEXTS = {
  intro: [
    {type:'p', text:"Bien avant que le navire ne prenne le large, il faut comprendre une chose essentielle : le Capitaine n'est pas un individu seul, mais une fonction."},
    {type:'p', text:"Sur ce navire, le rôle du Capitaine n'est pas de tout diriger, mais de savoir protéger la « cabine ». C'est cet endroit — réel ou symbolique — où l'on se réfugie pour préserver sa clarté."},
    {type:'p', text:"Ce livre n'est pas le récit d'une personne en particulier, mais le voyage d'une conscience."},
    {type:'p', text:'Embarquez. Vous y reconnaîtrez peut-être le Capitaine qui sommeille en vous.'}
  ],
  preambule: [
    {type:'p', text:"Bien avant que notre Capitaine ne tienne la barre, un autre navire ouvrait la route."},
    {type:'p', text:"C'était un bâtiment imposant, connu de tous les marins de la région."},
    {type:'p', text:"Puis vint le jour où il prit la direction du large. Sa silhouette s'éloigna peu à peu jusqu'à disparaître derrière l'horizon."},
    {type:'p', text:"Parmi eux se trouvait un jeune capitaine. Il possédait une qualité particulière : il observait."},
    {type:'p', text:"Comme un héritage transmis par la mer elle-même."}
  ],
  ch1: [
    {type:'p', text:"Le soleil n'était pas encore levé lorsque le Capitaine monta sur le pont."},
    {type:'p', text:"Comme avant chaque traversée, il parcourut lentement le navire. Il observa les amarres. Examina les voiles. Inspecta les cales. Vérifia les réserves."},
    {type:'p', text:"Ce matin-là, une caisse de matériel avait été arrimée du mauvais côté de la cale. L'erreur paraissait insignifiante. Elle fut simplement déplacée."},
    {type:'p', text:"À bord, chacun savait désormais que certaines difficultés étaient souvent résolues bien avant d'apparaître."}
  ],
  ch2: [
    {type:'p', text:"La mer était si calme que les nuages semblaient flotter à sa surface."},
    {type:'p', text:"Pourtant, le Capitaine continuait à parcourir le pont. Il vérifiait les amarres. Puis les réserves. Puis les voiles. Puis les lanternes."},
    {type:'p', text:"Il réalisa que le navire avait parfaitement poursuivi sa route sans qu'il ait eu besoin d'intervenir à chaque instant."},
    {type:'p', text:"Et la mer semblait savoir exactement ce qu'elle avait à faire."}
  ],
  ch3: [
    {type:'p', text:"Au milieu de la matinée, une voile se coinça légèrement dans un cordage usé."},
    {type:'p', text:"L'incident était mineur. Pourtant, l'information circula rapidement d'un bout à l'autre du navire."},
    {type:'p', text:"Seul le bruit qui avait entouré le problème avait été plus important que le problème lui-même."}
  ],
  ch4: [
    {type:'p', text:"Avec les années, le Capitaine avait appris à reconnaître un piège discret."},
    {type:'p', text:"Lorsque la mer devenait agitée, beaucoup de marins finissaient par croire qu'ils devaient porter la tempête en eux pour mieux la combattre. Ils surveillaient chaque vague, interprétaient chaque craquement du bois et guettaient le moindre changement de vent. Peu à peu, la mer entrait dans leur esprit avant même de monter sur le pont."},
    {type:'p', text:"Le Capitaine avait découvert une autre manière de naviguer."},
    {type:'p', text:"Derrière la porte de sa cabine, il ne cherchait pas à faire taire la tempête. Il se contentait d'entretenir la lampe."},
    {type:'p', text:"La mer pouvait frapper la coque. Le vent pouvait secouer les haubans. Les embruns pouvaient blanchir les vitres du hublot. Pourtant, sur la table à cartes, la flamme demeurait stable."},
    {type:'p', text:"Un soir d'hiver, alors qu'une houle lourde faisait gémir le navire depuis plusieurs heures, un jeune officier de quart s'acharnait sur la barre."},
    {type:'p', text:"À chaque vague, il corrigeait sa route."},
    {type:'p', text:"À chaque mouvement du bâtiment, il forçait davantage."},
    {type:'p', text:"Ses mains étaient crispées et son regard ne quittait plus les déferlantes."},
    {type:'p', text:"Le vieux second l'observa longtemps sans intervenir."},
    {type:'p', text:"Puis il s'approcha et posa devant lui une tasse encore fumante."},
    {type:'p', text:"Le jeune homme leva les yeux, surpris."},
    {type:'p', text:"Le second ne dit rien."},
    {type:'p', text:"Il regarda simplement la surface du café."},
    {type:'p', text:"Malgré les mouvements du navire, le liquide avait retrouvé son calme."},
    {type:'p', text:"Le jeune officier suivit son regard."},
    {type:'p', text:"Il observa la tasse."},
    {type:'p', text:"Puis l'horizon."},
    {type:'p', text:"Puis la tasse de nouveau."},
    {type:'p', text:"Le vieux marin retourna à son poste sans un mot."},
    {type:'p', text:"Dans l'ombre du gaillard d'avant, un jeune mousse avait assisté à toute la scène."},
    {type:'p', text:"Il regarda le second."},
    {type:'p', text:"Puis l'officier."},
    {type:'p', text:"Puis la tasse."},
    {type:'p', text:"Lui non plus ne comprenait pas vraiment ce qui venait de se passer."},
    {type:'p', text:"Pourtant, quelque chose semblait important."},
    {type:'p', text:"Alors il reprit silencieusement son travail et continua de ranger les cordages mouillés par les embruns."},
    {type:'p', text:"Cette nuit-là, personne ne sut exactement ce que le jeune officier avait compris."},
    {type:'p', text:"Mais ceux qui étaient de quart remarquèrent que, pour la première fois, il ne regardait plus chaque vague comme un ennemi."},
    {type:'p', text:"Quant au mousse, il conserva longtemps dans sa mémoire l'image de cette tasse immobile au milieu de la tempête."},
    {type:'p', text:"Certains enseignements prennent la mer bien avant d'être compris."},
    {type:'p', text:"Et certaines lampes continuent d'éclairer longtemps après que celui qui les a allumées a quitté la pièce."}
  ],
  ch5: [
    {type:'p', text:"Depuis plusieurs jours, le navire naviguait sous un ciel changeant."},
    {type:'p', text:"Les vents restaient favorables, mais une légère brume apparaissait régulièrement à l'horizon. Rien d'inquiétant. Rien d'exceptionnel. Seulement cette fine couche grise qui effaçait parfois les repères les plus lointains."},
    {type:'p', text:"Le Capitaine connaissait bien ces conditions. Dans ce genre de traversée, l'œil seul ne suffisait plus toujours. Il fallait faire confiance aux instruments."},
    {type:'p', text:"Le compas indiquait le cap. Les cartes confirmaient la route. Les relevés correspondaient aux prévisions. Tout était cohérent."},
    {type:'p', text:"Pourtant, le Capitaine revenait régulièrement consulter les mêmes informations. Il vérifiait une première fois. Puis une seconde. Puis encore une autre."},
    {type:'p', text:"Chaque contrôle confirmait exactement la même chose."},
    {type:'p', text:"Le navire suivait sa route."},
    {type:'p', text:"Les jours passèrent ainsi. Chaque matin, les instruments donnaient les mêmes indications. Chaque soir, le navire se trouvait exactement là où il devait être."},
    {type:'p', text:"Peu à peu, le Capitaine commença à observer autre chose."},
    {type:'p', text:"Il remarqua le calme des marins."},
    {type:'p', text:"La confiance du maître d'équipage."},
    {type:'p', text:"La précision des hommes de quart."},
    {type:'p', text:"Personne ne semblait inquiet."},
    {type:'p', text:"Personne ne remettait constamment en question la direction prise."},
    {type:'p', text:"Tous accomplissaient simplement leur tâche."},
    {type:'p', text:"Comme si la route était déjà connue."},
    {type:'p', text:"Un matin, alors que la brume recouvrait encore la mer, le Capitaine resta quelques instants immobile devant le compas."},
    {type:'p', text:"L'aiguille indiquait le nord."},
    {type:'p', text:"Comme elle l'avait fait la veille."},
    {type:'p', text:"Comme elle le ferait probablement le lendemain."},
    {type:'p', text:"Ce jour-là, il referma la carte un peu plus tôt que d'habitude."},
    {type:'p', text:"Non parce qu'il cessait d'être prudent."},
    {type:'p', text:"Non parce qu'il abandonnait sa vigilance."},
    {type:'p', text:"Simplement parce que tout ce qui devait être vérifié l'avait déjà été."},
    {type:'p', text:"Le navire poursuivit sa route."},
    {type:'p', text:"Les voiles restèrent bien orientées."},
    {type:'p', text:"Le vent demeura constant."},
    {type:'p', text:"Les instruments continuèrent silencieusement leur travail."},
    {type:'p', text:"Puis, au cœur de la nuit, la brume commença à se déchirer."},
    {type:'p', text:"D'abord lentement."},
    {type:'p', text:"Puis davantage."},
    {type:'p', text:"Le ciel apparut par fragments entre les nuages."},
    {type:'p', text:"Une étoile."},
    {type:'p', text:"Puis une autre."},
    {type:'p', text:"Puis des centaines."},
    {type:'p', text:"Puis des milliers."},
    {type:'p', text:"Bientôt, toute la voûte céleste sembla se refléter dans la mer noire."},
    {type:'p', text:"Même les hommes de quart cessèrent quelques instants de parler."},
    {type:'p', text:"Le mousse leva les yeux."},
    {type:'p', text:"Il resta immobile."},
    {type:'p', text:"Comme s'il découvrait un océan plus vaste encore que celui qu'il parcourait depuis des semaines."},
    {type:'p', text:"Le Capitaine l'observa discrètement."},
    {type:'p', text:"Il se souvenait encore de la première fois où il avait contemplé un ciel semblable."},
    {type:'p', text:"À cet âge-là, on croit souvent que les cartes expliquent le monde."},
    {type:'p', text:"Puis vient un jour où l'on comprend qu'elles n'en montrent qu'une infime partie."},
    {type:'p', text:"Pendant quelques minutes, personne ne pensa à la destination."},
    {type:'p', text:"Personne ne pensa au lendemain."},
    {type:'p', text:"Il n'y avait plus que le silence."},
    {type:'p', text:"La mer."},
    {type:'p', text:"Le ciel."},
    {type:'p', text:"Et cette multitude de lumières suspendues au-dessus du navire."},
    {type:'p', text:"À la tombée de l'aube, les étoiles disparurent une à une."},
    {type:'p', text:"La brume s'était totalement dissipée."},
    {type:'p', text:"L'horizon réapparut."},
    {type:'p', text:"Le Capitaine regarda longtemps la ligne claire où le ciel rejoignait la mer."},
    {type:'p', text:"Il comprit alors qu'il n'était pas seul à guider le voyage."},
    {type:'p', text:"Les cartes étaient là."},
    {type:'p', text:"Les instruments aussi."},
    {type:'p', text:"L'équipage également."},
    {type:'p', text:"Tout un ensemble de repères veillait déjà sur la traversée."},
    {type:'p', text:"La nuit avait poursuivi sa course."},
    {type:'p', text:"Le compas continuait de pointer sa direction avec la même discrétion qu'au premier jour."},
    {type:'p', text:"Et le navire avançait toujours."}
  ],
  ch6: [
    {type:'p', text:"La traversée avait été préparée avec soin."},
    {type:'p', text:"Les cartes avaient été vérifiées. Les réserves chargées. Les voiles inspectées. Les cordages remplacés lorsque cela était nécessaire. Rien n'avait été laissé au hasard."},
    {type:'p', text:"Le matin du départ, la mer était calme. Le vent soufflait dans la bonne direction. L'horizon était dégagé. Tout semblait promettre une traversée paisible."},
    {type:'p', text:"Durant les premiers jours, le navire avança exactement comme prévu."},
    {type:'p', text:"Les milles défilaient."},
    {type:'p', text:"Les quarts s'enchaînaient."},
    {type:'p', text:"Le voyage suivait la route tracée sur les cartes."},
    {type:'p', text:"Puis, un matin, le vent changea."},
    {type:'p', text:"Rien de spectaculaire."},
    {type:'p', text:"Aucun grain à l'horizon."},
    {type:'p', text:"Aucune tempête."},

    {type:'p', text:"Le navire ralentit."},

    {type:'p', text:"Il fallut modifier l'allure."},
    {type:'p', text:"Rechercher d'autres angles."},
    {type:'p', text:"Composer avec la mer."},
    {type:'p', text:"Le Capitaine consulta les cartes."},

    {type:'p', text:"Ils fonctionnaient parfaitement."},
    {type:'p', text:"Il observa les voiles."},
    {type:'p', text:"Elles étaient correctement réglées."},
    {type:'p', text:"Tout était en ordre."},
    {type:'p', text:"Et pourtant, le vent demeurait contraire."},
    {type:'p', text:"Pendant plusieurs jours, la situation resta la même."},
    {type:'p', text:"Le navire avançait toujours."},
    {type:'p', text:"Mais moins vite."},
    {type:'p', text:"Chaque mille parcouru demandait davantage de patience."},
    {type:'p', text:"Certains marins regardaient régulièrement l'horizon en espérant voir le vent tourner."},
    {type:'p', text:"D'autres calculaient le retard accumulé."},
    {type:'p', text:"Le Capitaine observait simplement la mer."},
    {type:'p', text:"Depuis plusieurs jours, le mousse surveillait lui aussi l'horizon."},
    {type:'p', text:"Chaque matin, il espérait apercevoir un changement."},
    {type:'p', text:"Chaque matin, les voiles demeuraient tendues dans la même direction."},
    {type:'p', text:"Chaque soir, le navire avançait encore trop lentement à son goût."},
    {type:'p', text:"Un crépuscule, alors que le soleil rougissait la surface de l'eau, il s'approcha du vieux maître d'équipage."},
    {type:'p', text:"Ils restèrent un moment silencieux à regarder la mer."},
    {type:'p', text:"Puis le jeune marin finit par demander :"},
    {type:'p', text:"— Comment sais-tu que nous sommes toujours sur la bonne route ?"},
    {type:'p', text:"Le vieux marin sourit."},
    {type:'p', text:"Ses yeux restèrent fixés sur l'horizon."},
    {type:'p', text:"— Parce que nous avançons encore."},
    {type:'p', text:"Le mousse attendit la suite."},
    {type:'p', text:"Mais aucune autre explication ne vint."},
    {type:'p', text:"Le silence reprit sa place entre eux."},
    {type:'p', text:"La réponse lui semblait incomplète."},
    {type:'p', text:"Presque décevante."},
    {type:'p', text:"Pourtant, il ne posa aucune autre question."},
    {type:'p', text:"Cette nuit-là, il resta longtemps appuyé au bastingage."},
    {type:'p', text:"Le navire avançait lentement."},
    {type:'p', text:"Mais il avançait."},
    {type:'p', text:"Les jours passèrent encore."},
    {type:'p', text:"Le vent demeura capricieux."},
    {type:'p', text:"Puis, un soir, alors que le soleil disparaissait derrière les vagues, la brise commença enfin à changer."},
    {type:'p', text:"D'abord légèrement."},
    {type:'p', text:"Puis davantage."},
    {type:'p', text:"Les voiles retrouvèrent progressivement leur pleine puissance."},
    {type:'p', text:"Le navire reprit de la vitesse."},
    {type:'p', text:"L'étrave fendit de nouveau l'eau avec assurance."},

    {type:'p', text:"Ce n'était pas le retour du vent favorable qu'il retenait."},
    {type:'p', text:"C'était autre chose."},
    {type:'p', text:"Durant tout ce temps, malgré les détours, malgré les ralentissements et malgré les journées plus longues que prévu, le navire n'avait jamais cessé d'avancer."},
    {type:'p', text:"La route avait changé."},
    {type:'p', text:"Le rythme avait changé."},
    {type:'p', text:"Mais le voyage avait continué."},

let currentChapter = '';
let v2data = {};   // { chapterId: [ blocks... ] }  — enrichissements V2 seulement
let history = [];

function loadState() {
  try {
    const s = localStorage.getItem('csp_v2_enrich');
    if (s) v2data = JSON.parse(s);
    const h = localStorage.getItem('csp_v2_history');
    if (h) history = JSON.parse(h);
  } catch(e) {}
}

function saveStateCore() {
  localStorage.setItem('csp_v2_enrich', JSON.stringify(v2data));
  localStorage.setItem('csp_v2_history', JSON.stringify(history));
}

function getNextVersionNum() {
  const nums = history.map(h => h.vnum || 0);
  return nums.length ? Math.max(...nums) + 1 : 1;
}

function autoGeneratePrompt() {
  if (!currentChapter) return;
  const chName = CHAPTER_NAMES[currentChapter];
  const theme = CHAPTER_THEMES[currentChapter];
  const v1text = V1_TEXTS[currentChapter].map(b => b.text).filter(Boolean).join('\n\n');
  const idea = document.getElementById('ideaInput').value.trim();

  const prompt = `Tu travailles sur le livre "Le Calme sur le Pont" de Younès Belgnaoui — un ouvrage de développement personnel à travers la métaphore maritime.

CHAPITRE : ${chName}
THÈME : ${theme}

TEXTE ORIGINAL V1 (ne pas modifier) :
${v1text}

${idea ? `DEMANDE SPÉCIFIQUE : ${idea}\n\n` : ''}MISSION : Rédige les enrichissements V2 de ce chapitre pour une édition grand public. Le texte V1 reste intact. Tu rédiges uniquement le contenu complémentaire.

STRUCTURE DES ENRICHISSEMENTS
Rédige les rubriques suivantes (omets celles qui ne s'appliquent pas au chapitre) :

1. VOIX INTÉRIEURE DU CAPITAINE
Réflexion intime, ton personnel, quelques paragraphes. Ce que le Capitaine pense mais ne dit pas à voix haute.

2. UNE HISTOIRE RAMENÉE DU LARGE
Anecdote concrète (maritime, professionnelle ou humaine) pour illustrer le message du chapitre.

3. CE QUE LA MER MURMURE
3 à 5 enseignements simples sous forme de liste. Pas de jargon. Pas de ton professoral.

4. AVANT DE REPRENDRE LA MER
1 ou 2 questions ouvertes pour inviter le lecteur à réfléchir à sa propre vie.

5. UNE PHRASE QUI RESTE
Une citation mémorable du Capitaine, entre guillemets.

6. NOTE DE QUART
Conseil court, concret, application immédiate.

7. SOUS LE REGARD DES ANCIENS
Leçon transmise entre un vieux marin et un plus jeune. Dialogue ou récit court.

RÈGLES ABSOLUES SUR LES SOUS-TITRES :
- Invente des sous-titres poétiques et originaux en lien avec le thème du chapitre
- Les sous-titres doivent évoquer la mer, le voyage, le temps, les marins, l'horizon, les traversées
- Évite les intitulés fonctionnels ou techniques (Carnet de bord, Transmission, Enseignements, Note de bord...)
- Évite tout vocabulaire de coaching, management ou développement personnel
- Le lecteur doit avoir l'impression de lire un beau livre illustré, pas un manuel
- Formate chaque sous-titre en gras : **Titre du sous-titre**

STYLE D'ÉCRITURE :
- Rythme narratif : des paragraphes courts mais construits, des phrases de longueur variée
- Davantage de scènes, de narration, de petits récits — moins de phrases isolées sur une ligne
- Le lecteur doit visualiser le navire, entendre le bois craquer, imaginer le capitaine réfléchir
- Évite les effets de liste type "Une voile. Une amarre. Une erreur." — construis de vrais paragraphes
- Les enseignements doivent apparaître naturellement au fil du récit, comme une marée qui monte
- Ton chaleureux : un vieux marin qui raconte une histoire au coin d'une table, pas un conférencier
- Évite tout vocabulaire de coaching, management, développement personnel
- Métaphore maritime cohérente tout au long

EXIGENCE NARRATIVE MAJEURE — FUSION DES RUBRIQUES :
Les rubriques (Voix intérieure, Histoire ramenée du large, Ce que la mer murmure...) constituent uniquement des INTENTIONS D'ÉCRITURE.
Elles ne doivent jamais apparaître comme des sections indépendantes ou des blocs séparés dans le texte final.
L'auteur les fusionne naturellement dans un récit continu. Le lecteur ne perçoit jamais de changement de rubrique.
Il suit une même traversée, une même scène, une même histoire qui se déploie progressivement.

PRINCIPE FONDAMENTAL :
- L'histoire prime toujours sur le message
- La narration prime toujours sur l'enseignement
- Les personnages priment toujours sur les concepts
Le lecteur s'attache au Capitaine, aux marins, aux traversées — avant de percevoir le sens profond.

INTERDICTION ABSOLUE :
- Rubriques ou sections artificielles visibles dans le texte
- Citations isolées sans contexte narratif
- Questions directes au lecteur
- Enseignements explicitement formulés
- Conseils pratiques
- Résumés du message du chapitre
- Listes à puces
- Morale expliquée
- Développement personnel déguisé
- Formulations du type "la leçon est", "il comprit que", "cela lui apprit que"

PRIVILÉGIER :
- Histoires complètes avec début, milieu et fin
- Dialogues entre marins, entre le Capitaine et son équipage
- Scènes de port, de traversée, de tempête, d'escale
- Souvenirs d'anciens capitaines transmis de génération en génération
- Gestes observés puis reproduits des années plus tard
- Détails sensoriels : odeur du bois mouillé, grincement des cordages, lumière des lanternes, embruns, brouillard, silence du large
- Personnages secondaires qui incarnent le message sans jamais l'expliquer

TEST DE QUALITÉ — avant chaque paragraphe :
→ Si ce paragraphe peut aller dans un livre de développement personnel → le réécrire
→ Si ce paragraphe ressemble à un conseil → le transformer en scène
→ Si ce paragraphe ressemble à une morale → le transformer en dialogue
→ Si ce paragraphe ressemble à une conclusion → le remplacer par une image ou un souvenir

THÈME RÉCURRENT — LES TEMPÊTES QUE L'ON ATTEND :
Explorer avec délicatesse le destin de marins qui, après tant d'années à affronter les tempêtes, ne savent plus vivre lorsque la mer devient calme.
Ils ne sont ni faibles ni excessifs : ils ont appris à survivre, surveillent l'horizon, vérifient les cordages deux fois, restent en alerte quand les autres se reposent.
Le récit ne les juge jamais ; le Capitaine se reconnaît parfois en eux.
Introduire, par touches, la figure du marin qui cherche une tempête qui ne vient pas — non par goût du danger, mais parce que le calme lui paraît étrange et le silence suspect.

LA CABINE COMME REFUGE :
La cabine est le lieu où l'on dépose ce qui n'a plus besoin d'être porté — on y laisse les jumelles, on y retire le ciré trempé, on y referme les cartes, on s'y assoit sans chercher ce qui pourrait mal tourner.

LE NAVIRE EST SOLIDE :
Montrer, sans jamais le dire, que le navire tient bon : voiles bien réglées, coque robuste, équipage compétent. La mer est parfois calme parce qu'elle est réellement calme — le danger n'est pas systématiquement caché derrière l'horizon.
Ne jamais écrire qu'une peur est imaginaire ni dire à un personnage qu'il n'a aucune raison de s'inquiéter. Montrer plutôt un horizon dégagé, une nuit sans incident, une traversée qui ne cherche pas à devenir une aventure.

UNIVERSALITÉ ET TRANSMISSION :
Ne jamais enfermer un personnage dans un profil unique (le marin inquiet n'est pas que l'angoisse, le vieux capitaine n'est pas que la sagesse, le mousse n'est pas que l'apprentissage) — chacun doit rester humain et nuancé.
Le fil conducteur de l'ouvrage est la transmission silencieuse : un geste aperçu puis reproduit des années plus tard, une phrase entendue une seule fois, une manière de tenir la barre.
Éviter les références à l'actualité, aux modes ou aux concepts psychologiques contemporains : l'histoire doit rester lisible dans vingt ou cinquante ans.

QUESTION DE CONTRÔLE AVANT VALIDATION :
"Cette histoire peut-elle être appréciée par un lecteur qui ne cherche aucun conseil et qui souhaite simplement lire un beau récit de mer et d'hommes ?" Si oui, le chapitre est sur la bonne route.

OBJECTIF FINAL :
Le lecteur doit croire qu'il lit l'histoire d'un Capitaine et de ses traversées.
Ce n'est qu'après plusieurs chapitres qu'il réalise progressivement qu'il est lui-même à bord du navire.

CONSIGNES TECHNIQUES :
- Commence directement par le premier sous-titre, sans introduction ni commentaire
- N'utilise JAMAIS les caractères #, ##, ### — uniquement **gras** pour les sous-titres
- Rédige en français
- Génère une seule version finale, sans doublons ni variantes, et vérifie l'absence de répétition de paragraphe ou de phrase avant de répondre`;

  document.getElementById('promptOutput').value = prompt;
  document.getElementById('promptSection').style.display = 'block';
}

function normalizeForSearch(s) {
  return s
    .replace(/[\u2018\u2019\u02BC\uFF07]/g, "'")
    .replace(/[\u201C\u201D]/g, '"')
    .replace(/\*/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

// Trouve la première occurrence de `search` dans `str` en ignorant les différences
// d'espaces/apostrophes, et renvoie les indices [start, end] dans `str` d'origine.
function findFuzzy(str, search) {
  const normSearch = normalizeForSearch(search);
  if (!normSearch) return null;
  const searchTokens = normSearch.split(' ');

  // Construit une version normalisée de str avec une table de correspondance d'indices
  const map = []; // map[i] = index dans str d'origine
  let norm = '';
  let lastWasSpace = false;
  for (let i = 0; i < str.length; i++) {
    let ch = str[i];
    ch = ch.replace(/[\u2018\u2019\u02BC\uFF07]/g, "'").replace(/[\u201C\u201D]/g, '"');
    if (ch === '*') continue;
    if (/\s/.test(ch)) {
      if (lastWasSpace) continue;
      norm += ' '; map.push(i); lastWasSpace = true;
    } else {
      norm += ch; map.push(i); lastWasSpace = false;
    }
  }
  norm = norm.trim();
  const trimOffset = str.search(/\S/);

  const idx = norm.indexOf(normSearch);
  if (idx === -1) return null;
  const startOrig = map[idx];
  const endOrig = map[idx + normSearch.length - 1] + 1;
  return [startOrig, endOrig];
}

function replaceFuzzy(str, search, replace) {
  let result = str;
  let count = 0;
  let pos = findFuzzy(result, search);
  while (pos) {
    result = result.slice(0, pos[0]) + replace + result.slice(pos[1]);
    count++;
    const rest = result.slice(pos[0] + replace.length);
    const restPos = findFuzzy(rest, search);
    if (!restPos) break;
    pos = [restPos[0] + pos[0] + replace.length, restPos[1] + pos[0] + replace.length];
  }
  return [result, count];
}

function applyReplace() {
  const search = document.getElementById('searchInput').value;
  const replace = document.getElementById('replaceInput').value;
  const status = document.getElementById('replaceStatus');

  if (!search) { status.textContent = 'Aucun texte à rechercher.'; status.style.color = '#c0392b'; return; }
  if (!currentChapter) { status.textContent = 'Sélectionnez un chapitre.'; status.style.color = '#c0392b'; return; }

  const v2 = v2data[currentChapter] || [];
  if (v2.length === 0) { status.textContent = 'Aucun enrichissement V2 à modifier.'; status.style.color = '#c0392b'; return; }

  let count = 0;
  const updated = v2.map(block => {
    const b = {...block};
    if (b.text) {
      const [newText, n] = replaceFuzzy(b.text, search, replace);
      if (n > 0) { b.text = newText; count += n; }
    }
    if (b.title) {
      const [newTitle, n] = replaceFuzzy(b.title, search, replace);
      if (n > 0) { b.title = newTitle; count += n; }
    }
    if (b.lines) {
      b.lines = b.lines.map(l => {
        const [newL, n] = replaceFuzzy(l, search, replace);
        if (n > 0) { count += n; return newL; }
        return l;
      });
    }
    return b;
  });

  if (count === 0) {
    status.textContent = 'Texte introuvable dans la V2.';
    status.style.color = '#c0392b';
    return;
  }

  pushHistory('Remplacement : "' + search.substring(0,30) + (search.length>30?'…':'') + '"');
  v2data[currentChapter] = updated;
  saveState();
  renderPreview();
  renderHistory();
  status.textContent = count + ' remplacement(s) effectué(s).';
  status.style.color = '#2a6e3a';
  document.getElementById('searchInput').value = '';
  document.getElementById('replaceInput').value = '';
}

}

function integrateResult() {
  const result = document.getElementById('resultInput').value.trim();
  if (!result) { alert('Aucun résultat à intégrer.'); return; }
  if (!currentChapter) { alert('Sélectionnez un chapitre.'); return; }

  const blocks = parseResult(result);
  if (!v2data[currentChapter]) v2data[currentChapter] = [];
  v2data[currentChapter] = v2data[currentChapter].concat(blocks);

  pushHistory('Ajout V2');
  saveState();
  renderPreview();
  renderHistory();
  document.getElementById('resultInput').value = '';
  document.getElementById('validateBtns').style.display = 'flex';
}

function syncResult() {
  const result = document.getElementById('resultInput').value.trim();
  if (!result) { alert('Aucun résultat à synchroniser.'); return; }
  if (!currentChapter) { alert('Sélectionnez un chapitre.'); return; }
  if (!confirm('Remplacer les enrichissements V2 de ce chapitre par ce nouveau texte ?')) return;

  // Snapshot avant
  if (v2data[currentChapter] && v2data[currentChapter].length) {
    pushHistory('Avant remplacement');
  }

  v2data[currentChapter] = parseResult(result);
  pushHistory('Remplacement V2');
  saveState();
  renderPreview();
  renderHistory();
  document.getElementById('resultInput').value = '';
  document.getElementById('validateBtns').style.display = 'flex';
}

function pushHistory(label) {
  const now = new Date();
  const vnum = getNextVersionNum();
  history.unshift({
    vnum,
    date: now.toLocaleDateString('fr-FR') + ' ' + now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}),
    chapter: CHAPTER_NAMES[currentChapter],
    chapterId: currentChapter,
    summary: label,
    snapshot: JSON.parse(JSON.stringify(v2data[currentChapter] || []))
  });
  if (history.length > 50) history = history.slice(0, 50);
  document.getElementById('previewStatus').textContent = 'V2.' + vnum + ' — ' + now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
}

function validateVersion() {
  document.getElementById('validateBtns').style.display = 'none';
  document.getElementById('previewStatus').textContent = '✓ Version validée';
  setTimeout(() => document.getElementById('previewStatus').textContent = '', 3000);
}

function revertLast() {
  if (!currentChapter) return;
  const last = history.find(h => h.chapterId === currentChapter);
  if (!last) { alert('Aucune version précédente.'); return; }
  if (!confirm('Revenir à la version précédente ?')) return;
  v2data[currentChapter] = JSON.parse(JSON.stringify(last.snapshot));
  saveState();
  renderPreview();
  document.getElementById('validateBtns').style.display = 'none';
  document.getElementById('previewStatus').textContent = 'Version précédente restaurée';
}

function resetChapterV2() {
  if (!currentChapter) return;
  if (!confirm('Effacer tous les enrichissements V2 de ce chapitre ? Le texte V1 est conservé.')) return;
  delete v2data[currentChapter];
  saveState();
  renderPreview();
  renderHistory();
  document.getElementById('previewStatus').textContent = 'V2 réinitialisée';
}

function deleteHistory(i) {
  if (!confirm('Supprimer cette entrée ?')) return;
  history.splice(i, 1);
  saveState();
  renderHistory();
}

// ══════════════════════════════════════════════
// PARSER RÉSULTAT IA
// ══════════════════════════════════════════════
function parseResult(text) {
  const blocks = [];
  if (!text || !text.trim()) return blocks;

  // Mapping sous-titres → types
  const SECTION_TYPES = {
    'carnet de bord du capitaine':  {type:'encadre', title:'Carnet de bord du Capitaine'},
    "l'histoire derrière l'histoire": {type:'encadre', title:"L'histoire derrière l'histoire"},
    'ce que le voyage nous enseigne': {type:'enseignements'},
    'question au lecteur':           {type:'question'},
    'citation du capitaine':         {type:'citation'},
    'note de bord':                  {type:'note'},
    'transmission':                  {type:'encadre', title:'Transmission'}
  };

  const lines = text.split('\n');
  let currentTitle = null;
  let currentLines = [];

  function flushSection(title, linesArr) {
    // Nettoyer les lignes vides en début/fin
    while (linesArr.length && !linesArr[0].trim()) linesArr.shift();
    while (linesArr.length && !linesArr[linesArr.length-1].trim()) linesArr.pop();
    const content = linesArr.join('\n').trim();
    if (!content && !title) return;

    const key = title ? title.toLowerCase() : null;
    const stype = key ? SECTION_TYPES[key] : null;

    if (!title || !stype) {
      // Texte libre — split par paragraphe (double saut de ligne OU ligne vide)
      const paras = content.split(/\n\s*\n/).filter(p => p.trim());
      if (paras.length > 0) {
        if (title && !stype) {
          // Sous-titre inconnu → part tag + paragraphes
          blocks.push({type:'part', text: title});
        }
        paras.forEach(p => blocks.push({type:'p', text: p.replace(/\n/g, ' ').trim()}));
      }
      return;
    }

    if (stype.type === 'enseignements') {
      const items = content.split('\n').filter(l=>l.trim().replace(/^[-•*]\s*/,''));
      blocks.push({type:'enseignements', lines: items.map(l=>l.replace(/^[-•*]\s*/,''))});
    } else if (stype.type === 'question') {
      blocks.push({type:'question', text: content});
    } else if (stype.type === 'citation') {
      blocks.push({type:'citation', text: content.replace(/^["«\s]+|["»\s]+$/g, '').trim()});
    } else if (stype.type === 'note') {
      blocks.push({type:'note', text: content});
    } else if (stype.type === 'encadre') {
      blocks.push({type:'encadre', title: stype.title, text: content});
    }
  }

  for (const line of lines) {
    const trimmed = line.trim();
    // Détecter sous-titre : ## Titre, ### Titre, ou **Titre** seul sur sa ligne
    if (/^#{1,4}\s+/.test(trimmed) || /^\*\*[^*]+\*\*$/.test(trimmed)) {
      flushSection(currentTitle, currentLines);
      currentTitle = trimmed.replace(/^#{1,4}\s+/, '').replace(/^\*\*|\*\*$/g, '').trim();
      currentLines = [];
    } else {
      currentLines.push(line);
    }
  }
  flushSection(currentTitle, currentLines);

  return blocks;
}

function mergeParagraphs(blocks) {
  // Fusionne tous les blocs 'p' consécutifs en un seul paragraphe continu (texte V1)
  const merged = [];
  let buffer = [];
  blocks.forEach(b => {
    if (b.type === 'p') {
      buffer.push(b.text);
    } else {
      if (buffer.length) { merged.push({type:'p', text: buffer.join(' ')}); buffer = []; }
      merged.push(b);
    }
  });
  if (buffer.length) merged.push({type:'p', text: buffer.join(' ')});
  return merged;
}

function renderBlocksHTML(blocks) {
  let html = '';
  blocks.forEach(block => {
    if (block.type === 'p') {
      html += `<p>${block.text}</p>`;
    } else if (block.type === 'part') {
      html += `<div class="part-tag">${block.text}</div>`;
    } else if (block.type === 'note') {
      html += `<div class="note-de-bord"><div class="ndb-label">Note de bord</div><p>${block.text}</p></div>`;
    } else if (block.type === 'citation') {
      html += `<div style="padding:32px 0;margin:32px 0;text-align:center;border-top:1px solid rgba(200,164,100,0.25);border-bottom:1px solid rgba(200,164,100,0.25)"><p style="font-style:italic;font-size:19px;color:#ffffff;line-height:1.7;font-family:Georgia,serif">"${block.text}"</p><div style="font-family:Helvetica Neue,sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-top:14px">— Le Capitaine</div></div>`;
    } else if (block.type === 'encadre') {
      html += `<div class="encadre"><div class="enc-label">${block.title || 'Encadré'}</div><p>${block.text}</p></div>`;
    } else if (block.type === 'question') {
      const lines = block.text.split('\n').filter(l=>l.trim()).map(l=>`<p style="font-style:italic;font-size:17px;color:#ffffff;margin:8px 0;font-family:Georgia,serif">${l.trim()}</p>`).join('');
      html += `<div style="padding:28px 0;margin:32px 0;border-top:1px solid rgba(200,164,100,0.25)"><div style="font-family:Helvetica Neue,sans-serif;font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:14px">Question au lecteur</div>${lines}</div>`;
    } else if (block.type === 'enseignements') {
      const items = (block.lines || []).map(l=>`<li style="margin-bottom:10px;line-height:1.8;color:#d8dde3">${l.replace(/^[-•*\d.]+\s*/,'')}</li>`).join('');
      html += `<div style="padding:28px 0;margin:32px 0;border-top:1px solid rgba(200,164,100,0.25)"><div style="font-family:Helvetica Neue,sans-serif;font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:16px">Ce que le voyage nous enseigne</div><ul style="padding-left:20px;font-size:16px;line-height:1.9">${items}</ul></div>`;
    }
  });
  return html;
}

function renderPreview() {
  if (!currentChapter) return;
  const v1 = V1_TEXTS[currentChapter] || [];
  const v2 = v2data[currentChapter] || [];
  const imgSrc = CHAPTER_IMAGES[currentChapter];

  let html = `
    <div class="ch-label">${CHAPTER_LABELS[currentChapter]}</div>
    <div class="ch-title">${CHAPTER_TITLES[currentChapter]}</div>
    <div class="ch-divider"></div>
  `;

  // V1 — LECTURE SEULE
  html += `<div class="v1-zone">
    <div class="v1-lock" title="Texte V1 verrouillé">🔒</div>
    <span class="v1-badge">VERSION 1 — TEXTE ORIGINAL</span>
    ${renderBlocksHTML(mergeParagraphs(v1))}
  </div>`;

  // V2 — ENRICHISSEMENTS
  html += `<div class="v2-separator">
    <div class="v2-line"></div>
    <div class="v2-label">✦ Enrichissements V2</div>
    <div class="v2-line"></div>
  </div>`;

  html += `<div class="v2-zone">`;
  if (v2.length === 0) {
    html += `<div class="v2-empty">Aucun enrichissement V2 pour ce chapitre.<br/>Génère un prompt et colle le résultat ci-contre.</div>`;
  } else {
    html += renderBlocksHTML(v2);
  }
  html += `</div>`;

  if (imgSrc) html += `<div class="illus"><img src="${imgSrc}" alt="${CHAPTER_TITLES[currentChapter]}"/></div>`;

  document.getElementById('bookPreview').innerHTML = html;
}

// ══════════════════════════════════════════════
// RENDER HISTORY
// ══════════════════════════════════════════════
function renderHistory() {
  const container = document.getElementById('historyList');
  const all = history.map((h, i) => ({...h, _i: i}));
  const filtered = currentChapter ? all.filter(h => h.chapterId === currentChapter) : all;
  if (filtered.length === 0) {
    container.innerHTML = '<div style="font-size:12px;color:var(--mid);font-style:italic;text-align:center;padding:12px">Aucune modification pour ce chapitre</div>';
    return;
  }
  container.innerHTML = filtered.map(h => { const i = h._i; return `
    <div class="history-item">
      <div class="h-date">
        <span>${h.vnum ? '<b>V2.' + h.vnum + '</b> — ' : ''}${h.date}</span>
        <button onclick="deleteHistory(${i})" style="background:none;border:none;color:#ccc;cursor:pointer;font-size:14px" title="Supprimer">✕</button>
      </div>
      <div class="h-summary">${h.summary}</div>
      <div class="h-actions">
        <button class="btn btn-outline btn-small" onclick="restoreVersion(${i})">↩ Restaurer</button>
        <button class="btn btn-small" style="background:rgba(255,255,255,0.06);color:var(--mid);border:1px solid var(--border);font-size:10px" onclick="openDrawer(${i})">👁 Lire</button>
      </div>
    </div>
  `; }).join('');
}

function restoreVersion(i) {
  if (!confirm('Restaurer cette version V2 ?')) return;
  const h = history[i];
  v2data[h.chapterId] = JSON.parse(JSON.stringify(h.snapshot));
  saveState();
  if (currentChapter === h.chapterId) renderPreview();
  renderHistory();
}

function openDrawer(i) {
  const h = history[i];
  if (!h) return;
  document.getElementById('drawer-title').textContent = (h.vnum ? 'V2.' + h.vnum + ' — ' : '') + (h.chapter || '');
  const blocks = h.snapshot || [];
  let html = '';
  blocks.forEach(b => {
    if (b.type === 'p') {
      html += '<p style="margin:0 0 12px">' + b.text + '</p>';
    } else if (b.type === 'part') {
      html += '<div style="font-size:9px;letter-spacing:2px;color:#C8A464;text-transform:uppercase;margin:20px 0 8px;padding-left:10px;border-left:3px solid #C8A464">' + b.text + '</div>';
    } else if (b.type === 'note') {
      html += '<div style="background:#162D49;color:#fff;padding:14px;border-radius:6px;margin:14px 0;font-size:13px">' + b.text + '</div>';
    } else if (b.type === 'encadre') {
      html += '<div style="border:1px solid #d4c8b8;padding:14px;border-radius:6px;margin:14px 0"><div style="font-size:9px;letter-spacing:2px;color:#a89e93;margin-bottom:8px">' + (b.title || 'Encadré') + '</div><p style="margin:0">' + b.text + '</p></div>';
    } else if (b.type === 'question') {
      html += '<div style="border-left:3px solid #C8A464;padding:10px 14px;margin:14px 0;font-style:italic;color:#8a6a30">' + b.text + '</div>';
    }
  });
  document.getElementById('drawer-content').innerHTML = html || '<p style="color:var(--mid);font-style:italic">Contenu vide</p>';
  document.getElementById('version-drawer').style.transform = 'translateX(0)';
  document.getElementById('drawer-overlay').style.display = 'block';
}

function closeDrawer() {
  document.getElementById('version-drawer').style.transform = 'translateX(100%)';
  document.getElementById('drawer-overlay').style.display = 'none';
}

function getDrawerSelection() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return '';
  const drawer = document.getElementById('drawer-content');
  if (!drawer.contains(sel.anchorNode)) return '';
  return sel.toString();
}

function copyDrawerSelection() {
  const txt = getDrawerSelection();
  if (!txt) { alert('Sélectionnez du texte dans le panneau d\'abord.'); return; }
  navigator.clipboard.writeText(txt);
  const btn = event.target;
  const orig = btn.textContent;
  btn.textContent = '✓ Copié';
  setTimeout(() => btn.textContent = orig, 2000);
}

function insertDrawerSelection(target) {
  const txt = getDrawerSelection();
  if (!txt) { alert('Sélectionnez du texte dans le panneau d\'abord.'); return; }
  const el = document.getElementById(target === 'result' ? 'resultInput' : 'ideaInput');
  if (!el) return;
  const start = el.selectionStart || el.value.length;
  const end = el.selectionEnd || el.value.length;
  el.value = el.value.slice(0, start) + txt + el.value.slice(end);
  el.selectionStart = el.selectionEnd = start + txt.length;
  el.focus();
  closeDrawer();
}

function markSaved() {
  unsavedChanges = false;
  const dot = document.getElementById('save-dot');
  if (dot) dot.style.display = 'none';
}

function exportSave() {
  const data = {
    version: 'csp_v2',
    date: new Date().toISOString(),
    v2data,
    history
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'calme-sur-le-pont-v2-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  markSaved();
  const status = document.getElementById('autosave-status');
  if (status) {
    status.textContent = '✓ Exporté';
    setTimeout(() => status.textContent = '', 3000);
  }
}

// ══════════════════════════════════════════════
// AUTO-SAVE + PROTECTION FERMETURE
// ══════════════════════════════════════════════

let unsavedChanges = false;

// Marquer les changements non sauvegardés
function saveState() {
  saveStateCore();
  unsavedChanges = true;
  const dot = document.getElementById('save-dot');
  if (dot) dot.style.display = 'inline';
}

// Auto-save toutes les 30 secondes si modifications
setInterval(() => {
  if (unsavedChanges) {
    localStorage.setItem('csp_v2_enrich', JSON.stringify(v2data));
    localStorage.setItem('csp_v2_history', JSON.stringify(history));
    markSaved();
    const status = document.getElementById('autosave-status');
    if (status) {
      status.textContent = '💾 Sauvegardé ' + new Date().toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});
      setTimeout(() => status.textContent = '', 3000);
    }
  }
}, 30000);

// Avertissement avant fermeture si modifications non exportées
window.addEventListener('beforeunload', e => {
  if (unsavedChanges) {
    e.preventDefault();
    e.returnValue = 'Des modifications non exportées seront perdues. Utilisez 💾 Sauvegarder avant de quitter.';
  }
});

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
loadState();

// Sélection auto du chapitre via ?ch=xxx
(function() {
  const params = new URLSearchParams(window.location.search);
  const ch = params.get('ch');
  if (ch) {
    const sel = document.getElementById('chapterSelect');
    if (sel && CHAPTER_NAMES[ch]) {
      sel.value = ch;
      onChapterChange();
    }
  }
})();
</script>
