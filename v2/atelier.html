<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Atelier V2 — Le Calme sur le Pont</title>
  <style>
    :root {
      --navy: #162D49;
      --navy2: #1e3d61;
      --gold: #C8A464;
      --beige: #F3EAE2;
      --dark: #1a1a1a;
      --mid: #666;
      --light: #faf7f4;
      --border: #e0d8d0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0ebe4; color: var(--dark); min-height: 100vh; }

    /* TOP NAV */
    .topnav {
      background: var(--navy);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 200;
      border-bottom: 2px solid var(--gold);
    }
    .topnav a { color: #8a9db0; text-decoration: none; font-size: 11px; letter-spacing: 1px; }
    .topnav a:hover { color: var(--gold); }
    .topnav .sep { color: #2a4060; }
    .topnav .current { color: var(--gold); font-size: 11px; }
    .topnav .badge { background: rgba(255,160,0,0.15); color: #c07000; font-size: 10px; letter-spacing: 2px; padding: 2px 8px; border-radius: 20px; border: 1px solid rgba(200,130,0,0.3); margin-left: auto; }

    /* LAYOUT */
    .workspace {
      display: grid;
      grid-template-columns: 400px 1fr;
      gap: 0;
      height: calc(100vh - 44px);
    }

    /* LEFT PANEL */
    .panel-left {
      background: white;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-header {
      background: var(--navy);
      color: white;
      padding: 14px 18px;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      flex-shrink: 0;
    }
    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* FORM ELEMENTS */
    label {
      display: block;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
    }
    select, textarea, input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 10px 12px;
      font-family: Georgia, serif;
      font-size: 13px;
      color: var(--dark);
      background: var(--light);
      resize: vertical;
      transition: border-color 0.2s;
    }
    select:focus, textarea:focus, input:focus {
      outline: none;
      border-color: var(--gold);
    }
    select { resize: none; cursor: pointer; }

    /* BUTTONS */
    .btn {
      display: block;
      width: 100%;
      padding: 11px 16px;
      border: none;
      border-radius: 3px;
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 12px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .btn-primary { background: var(--navy); color: white; }
    .btn-primary:hover { background: var(--navy2); }
    .btn-gold { background: var(--gold); color: white; }
    .btn-gold:hover { background: #b8944a; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--mid); }
    .btn-outline:hover { border-color: var(--navy); color: var(--navy); }
    .btn-small {
      display: inline-block;
      width: auto;
      padding: 6px 12px;
      font-size: 11px;
    }
    .btn-danger { background: #c0392b; color: white; }
    .btn-danger:hover { background: #a93226; }

    /* SECTIONS */
    .form-section {
      background: var(--light);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 14px;
    }
    .form-section.highlight {
      border-color: var(--gold);
      background: #fffbf5;
    }

    /* PROMPT AREA */
    .prompt-area {
      position: relative;
    }
    .prompt-area textarea {
      font-family: 'Helvetica Neue', monospace;
      font-size: 12px;
      min-height: 100px;
      background: #f8f4f0;
    }
    .copy-small {
      position: absolute;
      top: 6px;
      right: 6px;
      padding: 4px 10px;
      background: var(--navy);
      color: white;
      border: none;
      border-radius: 2px;
      font-size: 10px;
      cursor: pointer;
      letter-spacing: 1px;
    }

    /* HISTORIQUE */
    .history-block {
      border-top: 1px solid var(--border);
      padding-top: 14px;
      margin-top: 4px;
    }
    .history-title {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
    }
    .history-item {
      background: white;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 10px 12px;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .history-item .h-date { font-size: 10px; color: #aaa; margin-bottom: 4px; }
    .history-item .h-chapter { color: var(--gold); font-size: 10px; letter-spacing: 1px; margin-bottom: 4px; }
    .history-item .h-summary { color: var(--dark); line-height: 1.5; }
    .history-item .h-actions { margin-top: 8px; display: flex; gap: 6px; }

    /* RIGHT PANEL — PREVIEW */
    .panel-right {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .preview-header {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .preview-header .preview-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
    }
    .preview-header .preview-chapter {
      font-family: Georgia, serif;
      font-size: 14px;
      color: var(--dark);
    }
    .preview-header .status {
      margin-left: auto;
      font-size: 10px;
      color: #aaa;
      font-style: italic;
    }

    .preview-body {
      flex: 1;
      overflow-y: auto;
      background: var(--beige);
      padding: 40px;
    }

    /* BOOK PREVIEW STYLES */
    .book-preview {
      max-width: 580px;
      margin: 0 auto;
      font-family: Georgia, serif;
    }
    .book-preview .ch-label {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .book-preview .ch-title {
      font-size: 26px;
      font-weight: normal;
      letter-spacing: 1px;
      margin-bottom: 20px;
      color: var(--dark);
    }
    .book-preview .ch-divider {
      width: 40px;
      height: 1px;
      background: var(--gold);
      margin-bottom: 24px;
    }
    .book-preview p {
      font-size: 15px;
      line-height: 1.9;
      color: #2a2a2a;
      margin-bottom: 14px;
      text-align: justify;
    }
    .book-preview .part-tag {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #aaa;
      margin: 28px 0 10px;
      padding: 8px 12px;
      background: #ede8e0;
      border-left: 3px solid var(--gold);
    }
    .book-preview .note-de-bord {
      background: var(--navy);
      color: white;
      padding: 22px 26px;
      margin: 24px 0;
      border-radius: 4px;
    }
    .book-preview .note-de-bord .ndb-label {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
    }
    .book-preview .note-de-bord p {
      color: #c8d8e8;
      font-size: 14px;
      margin-bottom: 0;
    }
    .book-preview .encadre {
      background: white;
      border: 1px solid var(--border);
      border-left: 4px solid var(--gold);
      padding: 18px 22px;
      margin: 24px 0;
      border-radius: 0 4px 4px 0;
    }
    .book-preview .encadre .enc-label {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .book-preview .encadre p { font-size: 13px; color: #444; }
    .book-preview .illus {
      margin: 28px 0;
      text-align: center;
    }
    .book-preview .illus img {
      width: 100%;
      max-width: 520px;
      border: 1px solid #d0c8c0;
    }
    .book-preview .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #bbb;
    }
    .book-preview .empty-state .es-icon { font-size: 40px; margin-bottom: 16px; }
    .book-preview .empty-state p { font-size: 13px; font-style: italic; }

    /* MOBILE */
    @media (max-width: 768px) {
      .workspace { grid-template-columns: 1fr; height: auto; }
      .panel-right { min-height: 60vh; }
    }
  </style>
</head>
<body>

<nav class="topnav">
  <a href="../index.html">Accueil</a>
  <span class="sep">›</span>
  <a href="index.html">Version 2</a>
  <span class="sep">›</span>
  <span class="current">Atelier éditorial</span>
  <span class="badge">✍️ En chantier</span>
</nav>

<div class="workspace">

  <!-- ═══ COLONNE GAUCHE ═══ -->
  <div class="panel-left">
    <div class="panel-header">Atelier d'édition</div>
    <div class="panel-body">

      <!-- 1. SÉLECTION CHAPITRE -->
      <div class="form-section">
        <label>1 — Chapitre à travailler</label>
        <select id="chapterSelect" onchange="onChapterChange()">
          <option value="">— Choisir un chapitre —</option>
          <option value="intro">Introduction — L'Art de tenir la barre</option>
          <option value="preambule">Préambule — L'Héritage du Large</option>
          <option value="ch1">Chapitre 1 — Le Don du Capitaine</option>
          <option value="ch2">Chapitre 2 — Le Calme sur le Pont</option>
          <option value="ch3">Chapitre 3 — Le Bruit de Fond</option>
          <option value="ch4">Chapitre 4 — Les Instruments de Bord</option>
          <option value="ch5">Chapitre 5 — Le Vent Contraire</option>
          <option value="ch6">Chapitre 6 — Le Long Cours</option>
          <option value="epilogue">Épilogue — Le Port</option>
        </select>
      </div>

      <!-- 2. IDÉE -->
      <div class="form-section">
        <label>2 — Idée ou demande</label>
        <textarea id="ideaInput" rows="4" placeholder="Ex: Ajouter un carnet de bord sur la transmission&#10;Développer l'exemple du capitaine&#10;Rendre le chapitre plus accessible&#10;Ajouter une anecdote concrète…"></textarea>
        <button class="btn btn-primary" style="margin-top:10px" onclick="generatePrompt()">⚡ Générer le prompt</button>
      </div>

      <!-- 3. PROMPT GÉNÉRÉ -->
      <div class="form-section highlight" id="promptSection" style="display:none">
        <label>3 — Prompt généré <span style="color:#aaa;font-size:9px;letter-spacing:0">(modifiable)</span></label>
        <div class="prompt-area">
          <textarea id="promptOutput" rows="7"></textarea>
          <button class="copy-small" onclick="copyPrompt()">Copier</button>
        </div>
      </div>

      <!-- 4. RÉSULTAT IA -->
      <div class="form-section" id="resultSection" style="display:none">
        <label>4 — Résultat IA</label>
        <textarea id="resultInput" rows="8" placeholder="Colle ici le résultat obtenu depuis Claude ou ChatGPT…"></textarea>
        <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
          <button class="btn btn-gold" onclick="integrateResult()">+ Ajouter au chapitre</button>
          <button class="btn" style="background:#1e3d61;color:#fff;border:none" onclick="syncResult()">↺ Synchroniser (remplacer)</button>
          <button class="btn btn-outline btn-small" onclick="clearResult()">Effacer</button>
        </div>
      </div>

      <!-- HISTORIQUE -->
      <div class="history-block">
        <div class="history-title" style="display:flex;align-items:center;justify-content:space-between">
        <span>Historique des modifications</span>
        <button class="btn btn-small" style="background:#162D49;color:#C8A464;border:1px solid #C8A464;font-size:10px;letter-spacing:1px" onclick="exportSave()">💾 Sauvegarder</button>
      </div>
        <div id="historyList">
          <div style="font-size:12px;color:#bbb;font-style:italic;text-align:center;padding:16px">Aucune modification enregistrée</div>
        </div>
      </div>

    </div>
  </div>

  <!-- ═══ COLONNE DROITE — APERÇU ═══ -->
  <div class="panel-right">
    <div class="preview-header">
      <span class="preview-label">Aperçu V2</span>
      <span class="preview-chapter" id="previewChapterName">— Sélectionner un chapitre —</span>
      <span class="status" id="previewStatus"></span>
    </div>
    <div class="preview-body">
      <div class="book-preview" id="bookPreview">
        <div class="empty-state">
          <div class="es-icon">⚓</div>
          <p>Sélectionnez un chapitre dans l'atelier<br/>pour voir son contenu apparaître ici.</p>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════════════
// DONNÉES — Textes V1 de base par chapitre
// ══════════════════════════════════════════════
const CHAPTER_NAMES = {
  intro: "Introduction — L'Art de tenir la barre",
  preambule: "Préambule — L'Héritage du Large",
  ch1: "Chapitre 1 — Le Don du Capitaine",
  ch2: "Chapitre 2 — Le Calme sur le Pont",
  ch3: "Chapitre 3 — Le Bruit de Fond",
  ch4: "Chapitre 4 — Les Instruments de Bord",
  ch5: "Chapitre 5 — Le Vent Contraire",
  ch6: "Chapitre 6 — Le Long Cours",
  epilogue: "Épilogue — Le Port"
};

const CHAPTER_LABELS = {
  intro: "Introduction", preambule: "Préambule",
  ch1: "Chapitre 1", ch2: "Chapitre 2", ch3: "Chapitre 3",
  ch4: "Chapitre 4", ch5: "Chapitre 5", ch6: "Chapitre 6",
  epilogue: "Épilogue"
};

const CHAPTER_TITLES = {
  intro: "L'ART DE TENIR LA BARRE",
  preambule: "L'HÉRITAGE DU LARGE",
  ch1: "LE DON DU CAPITAINE",
  ch2: "LE CALME SUR LE PONT",
  ch3: "LE BRUIT DE FOND",
  ch4: "LES INSTRUMENTS DE BORD",
  ch5: "LE VENT CONTRAIRE",
  ch6: "LE LONG COURS",
  epilogue: "LE PORT"
};

const CHAPTER_IMAGES = {
  intro: "../assets/images/art_barre.jpeg",
  preambule: "../assets/images/preambule.jpeg",
  ch1: "../assets/images/ch1.jpeg",
  ch2: "../assets/images/ch2.jpeg",
  ch3: "../assets/images/ch3.jpeg",
  ch4: "../assets/images/ch4.jpeg",
  ch5: "../assets/images/ch5_vent_contraire.jpeg",
  ch6: "../assets/images/ch6_long_cours.jpeg",
  epilogue: "../assets/images/epilogue.jpeg"
};

// V1 base texts (short versions for seed)
const V1_TEXTS = {
  intro: [
    {type:'part', text:'La Scène (V1)'},
    {type:'p', text:"Bien avant que le navire ne prenne le large, il faut comprendre une chose essentielle : le Capitaine n'est pas un individu seul, mais une fonction."},
    {type:'p', text:"Sur ce navire, le rôle du Capitaine n'est pas de tout diriger, mais de savoir protéger la « cabine ». C'est cet endroit — réel ou symbolique — où l'on se réfugie pour préserver sa clarté."},
    {type:'p', text:"Ce livre n'est pas le récit d'une personne en particulier, mais le voyage d'une conscience."},
    {type:'p', text:'Embarquez. Vous y reconnaîtrez peut-être le Capitaine qui sommeille en vous.'}
  ],
  preambule: [
    {type:'part', text:'La Scène (V1)'},
    {type:'p', text:"Bien avant que notre Capitaine ne tienne la barre, un autre navire ouvrait la route."},
    {type:'p', text:"C'était un bâtiment imposant, connu de tous les marins de la région."},
    {type:'p', text:"Puis vint le jour où il prit la direction du large. Sa silhouette s'éloigna peu à peu jusqu'à disparaître derrière l'horizon."},
    {type:'p', text:"Parmi eux se trouvait un jeune capitaine. Il possédait une qualité particulière : il observait."},
    {type:'p', text:"Comme un héritage transmis par la mer elle-même."}
  ],
  ch1: [
    {type:'part', text:'La Scène (V1)'},
    {type:'p', text:"Le soleil n'était pas encore levé lorsque le Capitaine monta sur le pont."},
    {type:'p', text:"Comme avant chaque traversée, il parcourut lentement le navire. Il observa les amarres. Examina les voiles. Inspecta les cales. Vérifia les réserves."},
    {type:'p', text:"Ce matin-là, une caisse de matériel avait été arrimée du mauvais côté de la cale. L'erreur paraissait insignifiante. Elle fut simplement déplacée."},
    {type:'p', text:"À bord, chacun savait désormais que certaines difficultés étaient souvent résolues bien avant d'apparaître."}
  ],
  ch2: [
    {type:'part', text:'La Scène (V1)'},
    {type:'p', text:"La mer était si calme que les nuages semblaient flotter à sa surface."},
    {type:'p', text:"Pourtant, le Capitaine continuait à parcourir le pont. Il vérifiait les amarres. Puis les réserves. Puis les voiles. Puis les lanternes."},
    {type:'p', text:"Il réalisa que le navire avait parfaitement poursuivi sa route sans qu'il ait eu besoin d'intervenir à chaque instant."},
    {type:'p', text:"Et la mer semblait savoir exactement ce qu'elle avait à faire."}
  ],
  ch3: [
    {type:'part', text:'La Scène (V1)'},
    {type:'p', text:"Au milieu de la matinée, une voile se coinça légèrement dans un cordage usé."},
    {type:'p', text:"L'incident était mineur. Pourtant, l'information circula rapidement d'un bout à l'autre du navire."},
    {type:'p', text:"Seul le bruit qui avait entouré le problème avait été plus important que le problème lui-même."}
  ],
  ch4: [
    {type:'part', text:'La Scène (V1)'},
    {type:'p', text:"Depuis plusieurs jours, le navire naviguait sous un ciel changeant."},
    {type:'p', text:"Le compas indiquait le cap. Les cartes confirmaient la route. Pourtant, le Capitaine revenait régulièrement consulter les mêmes informations."},
    {type:'p', text:"Il comprit alors qu'il n'était pas seul à guider le voyage. Les cartes étaient là. Les instruments aussi. L'équipage également."}
  ],
  ch5: [
    {type:'part', text:'La Scène (V1)'},
    {type:'p', text:"La traversée avait été préparée avec soin. Rien n'avait été laissé au hasard."},
    {type:'p', text:"Puis, un matin, le vent changea. Rien de spectaculaire. Simplement un vent qui décida de souffler autrement."},
    {type:'p', text:"Préparer parfaitement un voyage ne donne pas le pouvoir de choisir le vent."},
    {type:'p', text:"Et pourtant, le navire avançait toujours."}
  ],
  ch6: [
    {type:'part', text:'La Scène (V1)'},
    {type:'p', text:"Le voyage durait depuis de nombreuses semaines."},
    {type:'p', text:"Un océan ne se franchit pas en une journée. Il ne se franchit pas non plus en restant continuellement debout à surveiller chaque vague."},
    {type:'p', text:"Pour la première fois depuis longtemps, le Capitaine quitta le pont avant la tombée complète de la nuit."},
    {type:'p', text:"La mer n'avait pas eu besoin de lui pendant chaque minute de la nuit. Et pourtant, le voyage avançait toujours."}
  ],
  epilogue: [
    {type:'part', text:'La Scène (V1)'},
    {type:'p', text:"Le soleil descendait lentement derrière les quais. Le navire était amarré depuis plusieurs heures."},
    {type:'p', text:"Le Capitaine regarda une dernière fois l'horizon. Puis il quitta le pont."},
    {type:'p', text:"Derrière lui, le navire demeura immobile. Comme s'il lui rappelait doucement qu'il savait désormais tenir la mer lui aussi."}
  ]
};

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let currentChapter = '';
let chapters = {}; // { chapterId: [ {type, text}, ... ] }
let history = [];

function loadState() {
  try {
    const saved = localStorage.getItem('csp_v2_chapters');
    if (saved) chapters = JSON.parse(saved);
    const savedH = localStorage.getItem('csp_v2_history');
    if (savedH) history = JSON.parse(savedH);
  } catch(e) {}
}

function saveState() {
  localStorage.setItem('csp_v2_chapters', JSON.stringify(chapters));
  localStorage.setItem('csp_v2_history', JSON.stringify(history));
}

function getChapterContent(id) {
  if (chapters[id] && chapters[id].length > 0) return chapters[id];
  return V1_TEXTS[id] || [];
}

// ══════════════════════════════════════════════
// EVENTS
// ══════════════════════════════════════════════
function onChapterChange() {
  const sel = document.getElementById('chapterSelect');
  currentChapter = sel.value;
  if (!currentChapter) {
    document.getElementById('previewChapterName').textContent = '— Sélectionner un chapitre —';
    document.getElementById('bookPreview').innerHTML = `<div class="empty-state"><div class="es-icon">⚓</div><p>Sélectionnez un chapitre dans l'atelier<br/>pour voir son contenu apparaître ici.</p></div>`;
    return;
  }
  document.getElementById('previewChapterName').textContent = CHAPTER_NAMES[currentChapter];
  document.getElementById('promptSection').style.display = 'none';
  document.getElementById('resultSection').style.display = 'none';
  renderPreview();
}

function generatePrompt() {
  const chapter = document.getElementById('chapterSelect').value;
  const idea = document.getElementById('ideaInput').value.trim();
  if (!chapter) { alert('Choisissez d\'abord un chapitre.'); return; }
  if (!idea) { alert('Décrivez votre idée ou demande.'); return; }

  const chName = CHAPTER_NAMES[chapter];
  const prompt = `Tu travailles sur le livre "Le Calme sur le Pont" de Younès Belgnaoui — une œuvre de développement personnel à travers une métaphore maritime.

CHAPITRE CONCERNÉ : ${chName}

DEMANDE : ${idea}

CONSIGNES DE RÉDACTION :
- Respecte le ton du livre : poétique pour l'immersion maritime, accessible pour le développement personnel
- Style sobre, phrases courtes, pas de jargon
- La métaphore maritime doit rester cohérente (capitaine, équipage, mer, barre, cap, voiles, cabine...)
- Structure en 4 parties si pertinent :
  1. LA SCÈNE — narration maritime concrète
  2. L'INTROSPECTION — le Capitaine dans sa cabine, sa posture intérieure
  3. L'ÉCHO — interaction humaine avec l'équipage, ancrage universel
  4. LA NOTE DE BORD — maxime courte et actionnable pour le lecteur

FORMAT DE RÉPONSE :
Utilise ces balises pour structurer ton texte :
[SCENE] ... [/SCENE]
[INTROSPECTION] ... [/INTROSPECTION]
[ECHO] ... [/ECHO]
[NOTE] ... [/NOTE]
[ENCADRE titre="..."] ... [/ENCADRE]

Rédige uniquement le contenu demandé, sans introduction ni commentaire.`;

  document.getElementById('promptOutput').value = prompt;
  document.getElementById('promptSection').style.display = 'block';
  document.getElementById('resultSection').style.display = 'block';
  document.getElementById('promptOutput').scrollIntoView({behavior:'smooth', block:'nearest'});
}

function copyPrompt() {
  const t = document.getElementById('promptOutput');
  navigator.clipboard.writeText(t.value);
  const btn = document.querySelector('.copy-small');
  btn.textContent = 'Copié ✓';
  setTimeout(() => btn.textContent = 'Copier', 2000);
}

function clearResult() {
  document.getElementById('resultInput').value = '';
}

function integrateResult() {
  const result = document.getElementById('resultInput').value.trim();
  const idea = document.getElementById('ideaInput').value.trim();
  if (!result) { alert('Aucun résultat à intégrer.'); return; }
  if (!currentChapter) { alert('Sélectionnez un chapitre.'); return; }

  const blocks = parseResult(result);
  if (!chapters[currentChapter]) chapters[currentChapter] = [...getChapterContent(currentChapter)];
  chapters[currentChapter] = chapters[currentChapter].concat(blocks);

  // Add to history
  const now = new Date();
  history.unshift({
    date: now.toLocaleDateString('fr-FR') + ' ' + now.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'}),
    chapter: CHAPTER_NAMES[currentChapter],
    chapterId: currentChapter,
    summary: idea || 'Modification sans description',
    snapshot: JSON.parse(JSON.stringify(chapters[currentChapter]))
  });
  if (history.length > 20) history = history.slice(0, 20);

  saveState();
  renderPreview();
  renderHistory();

  document.getElementById('resultInput').value = '';
  document.getElementById('ideaInput').value = '';
  document.getElementById('previewStatus').textContent = 'Mis à jour à ' + now.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});
}

function syncResult() {
  const result = document.getElementById('resultInput').value.trim();
  const idea = document.getElementById('ideaInput').value.trim();
  if (!result) { alert('Aucun résultat à synchroniser.'); return; }
  if (!currentChapter) { alert('Sélectionnez un chapitre.'); return; }
  if (!confirm('Remplacer le contenu actuel du chapitre par ce nouveau texte ?')) return;

  // Snapshot avant remplacement
  const now = new Date();
  if (!chapters[currentChapter]) chapters[currentChapter] = [...getChapterContent(currentChapter)];
  history.unshift({
    date: now.toLocaleDateString('fr-FR') + ' ' + now.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'}),
    chapter: CHAPTER_NAMES[currentChapter],
    chapterId: currentChapter,
    summary: (idea || 'Synchronisation') + ' [avant remplacement]',
    snapshot: JSON.parse(JSON.stringify(chapters[currentChapter]))
  });

  const blocks = parseResult(result);
  chapters[currentChapter] = blocks;

  history.unshift({
    date: now.toLocaleDateString('fr-FR') + ' ' + now.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'}),
    chapter: CHAPTER_NAMES[currentChapter],
    chapterId: currentChapter,
    summary: idea || 'Synchronisation (remplacement)',
    snapshot: JSON.parse(JSON.stringify(chapters[currentChapter]))
  });
  if (history.length > 30) history = history.slice(0, 30);

  saveState();
  renderPreview();
  renderHistory();
  document.getElementById('resultInput').value = '';
  document.getElementById('ideaInput').value = '';
  document.getElementById('previewStatus').textContent = 'Synchronisé à ' + now.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});
}

function exportSave() {
  const data = {
    version: 'csp_v2',
    date: new Date().toISOString(),
    chapters,
    history
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'calme-sur-le-pont-sauvegarde-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function parseResult(text) {
  const blocks = [];

  // Regex qui capture les balises dans l'ordre d'apparition
  const tagRegex = /\[SCENE\]([\s\S]*?)\[\/SCENE\]|\[INTROSPECTION\]([\s\S]*?)\[\/INTROSPECTION\]|\[ECHO\]([\s\S]*?)\[\/ECHO\]|\[NOTE\]([\s\S]*?)\[\/NOTE\]|\[ENCADRE(?:\s+titre="([^"]*)")?\s*\]([\s\S]*?)\[\/ENCADRE\]/g;

  let match;
  let lastIndex = 0;
  let hasTag = false;

  while ((match = tagRegex.exec(text)) !== null) {
    hasTag = true;

    // Texte libre avant la balise
    const before = text.substring(lastIndex, match.index).trim();
    if (before) {
      before.split('\n\n').filter(p => p.trim()).forEach(p => {
        blocks.push({type:'p', text: p.trim()});
      });
    }
    lastIndex = match.index + match[0].length;

    if (match[1] !== undefined) {
      // [SCENE]
      blocks.push({type:'part', text:'La Scène'});
      match[1].trim().split('\n\n').filter(p => p.trim()).forEach(p => blocks.push({type:'p', text: p.trim()}));
    } else if (match[2] !== undefined) {
      // [INTROSPECTION]
      blocks.push({type:'part', text:"L'Introspection"});
      match[2].trim().split('\n\n').filter(p => p.trim()).forEach(p => blocks.push({type:'p', text: p.trim()}));
    } else if (match[3] !== undefined) {
      // [ECHO]
      blocks.push({type:'part', text:"L'Écho"});
      match[3].trim().split('\n\n').filter(p => p.trim()).forEach(p => blocks.push({type:'p', text: p.trim()}));
    } else if (match[4] !== undefined) {
      // [NOTE]
      blocks.push({type:'note', text: match[4].trim()});
    } else if (match[6] !== undefined) {
      // [ENCADRE titre="..."]
      const title = match[5] || 'Encadré';
      blocks.push({type:'encadre', title: title, text: match[6].trim()});
    }
  }

  // Texte libre après la dernière balise
  const after = text.substring(lastIndex).trim();
  if (after) {
    after.split('\n\n').filter(p => p.trim()).forEach(p => {
      blocks.push({type:'p', text: p.trim()});
    });
  }

  // Si aucune balise trouvée
  if (!hasTag) {
    text.split('\n\n').filter(p => p.trim()).forEach(p => {
      blocks.push({type:'p', text: p.trim()});
    });
  }

  return blocks;
}

// ══════════════════════════════════════════════
// RENDER PREVIEW
// ══════════════════════════════════════════════
function renderPreview() {
  if (!currentChapter) return;
  const content = getChapterContent(currentChapter);
  const imgSrc = CHAPTER_IMAGES[currentChapter];

  let html = `
    <div class="ch-label">${CHAPTER_LABELS[currentChapter]}</div>
    <div class="ch-title">${CHAPTER_TITLES[currentChapter]}</div>
    <div class="ch-divider"></div>
  `;

  content.forEach(block => {
    if (block.type === 'p') {
      html += `<p>${block.text}</p>`;
    } else if (block.type === 'part') {
      html += `<div class="part-tag">${block.text}</div>`;
    } else if (block.type === 'note') {
      html += `<div class="note-de-bord"><div class="ndb-label">Note de bord</div><p>${block.text}</p></div>`;
    } else if (block.type === 'encadre') {
      html += `<div class="encadre"><div class="enc-label">${block.title || 'Encadré'}</div><p>${block.text}</p></div>`;
    }
  });

  if (imgSrc) {
    html += `<div class="illus"><img src="${imgSrc}" alt="${CHAPTER_TITLES[currentChapter]}"/></div>`;
  }

  document.getElementById('bookPreview').innerHTML = html;
}

// ══════════════════════════════════════════════
// RENDER HISTORY
// ══════════════════════════════════════════════
function renderHistory() {
  const container = document.getElementById('historyList');
  if (history.length === 0) {
    container.innerHTML = '<div style="font-size:12px;color:#bbb;font-style:italic;text-align:center;padding:16px">Aucune modification enregistrée</div>';
    return;
  }
  container.innerHTML = history.map((h, i) => `
    <div class="history-item">
      <div class="h-date">${h.date}</div>
      <div class="h-chapter">${h.chapter}</div>
      <div class="h-summary">${h.summary}</div>
      <div class="h-actions">
        <button class="btn btn-outline btn-small" onclick="restoreVersion(${i})">↩ Restaurer</button>
        <button class="btn btn-small" style="background:#f5f0ea;color:#666;border:1px solid #ddd" onclick="previewVersion(${i})">👁 Voir</button>
      </div>
    </div>
  `).join('');
}

function restoreVersion(i) {
  if (!confirm('Restaurer cette version ? Le contenu actuel sera remplacé.')) return;
  const h = history[i];
  chapters[h.chapterId] = JSON.parse(JSON.stringify(h.snapshot));
  saveState();
  if (currentChapter === h.chapterId) renderPreview();
  alert('Version restaurée.');
}

function previewVersion(i) {
  const h = history[i];
  // Switch to that chapter and show snapshot
  document.getElementById('chapterSelect').value = h.chapterId;
  currentChapter = h.chapterId;
  document.getElementById('previewChapterName').textContent = h.chapter;
  // Temporarily show snapshot
  const snapshot = h.snapshot;
  const imgSrc = CHAPTER_IMAGES[h.chapterId];
  let html = `<div class="ch-label" style="opacity:0.5">APERÇU HISTORIQUE — ${h.date}</div><div class="ch-label">${CHAPTER_LABELS[h.chapterId]}</div><div class="ch-title">${CHAPTER_TITLES[h.chapterId]}</div><div class="ch-divider"></div>`;
  snapshot.forEach(block => {
    if (block.type === 'p') html += `<p>${block.text}</p>`;
    else if (block.type === 'part') html += `<div class="part-tag">${block.text}</div>`;
    else if (block.type === 'note') html += `<div class="note-de-bord"><div class="ndb-label">Note de bord</div><p>${block.text}</p></div>`;
    else if (block.type === 'encadre') html += `<div class="encadre"><div class="enc-label">${block.title||'Encadré'}</div><p>${block.text}</p></div>`;
  });
  if (imgSrc) html += `<div class="illus"><img src="${imgSrc}"/></div>`;
  document.getElementById('bookPreview').innerHTML = html;
}

// INIT
// ══════════════════════════════════════════════
loadState();
renderHistory();
</script>
